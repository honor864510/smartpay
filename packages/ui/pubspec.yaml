name: ui
description: Shared UI Components, Widgets, Fonts, Colors and Theme
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: ">=3.29.0"

# https://dart.dev/tools/pub/workspaces
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  intl:
  collection:
  #google_fonts:
  theme_tailor_annotation: ^3.0.2

  # UI
  octo_image: ^2.1.0
  cached_network_image: ^3.4.1

dev_dependencies:
  # Test
  flutter_test:
    sdk: flutter
  
  build_runner: ^2.4.15
  theme_tailor: ^3.0.2

flutter:
  uses-material-design: true
